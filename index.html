<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IELTS Master — 120天备考计划</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.x/tabler-icons.min.css" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      :root {
        --color-background-primary: #ffffff;
        --color-background-secondary: #f5f5f3;
        --color-background-tertiary: #eeede9;
        --color-text-primary: #1a1a18;
        --color-text-secondary: #5f5e5a;
        --color-text-tertiary: #888780;
        --color-border-tertiary: rgba(0,0,0,0.12);
        --color-border-secondary: rgba(0,0,0,0.22);
        --border-radius-md: 8px;
        --border-radius-lg: 12px;
        --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --color-background-primary: #1e1e1c;
          --color-background-secondary: #262624;
          --color-background-tertiary: #141412;
          --color-text-primary: #f0ede6;
          --color-text-secondary: #a8a49c;
          --color-text-tertiary: #6e6b64;
          --color-border-tertiary: rgba(255,255,255,0.1);
          --color-border-secondary: rgba(255,255,255,0.18);
        }
      }
      input, select, textarea, button { font-family: inherit; }
      button { cursor: pointer; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
